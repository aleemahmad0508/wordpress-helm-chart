apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: wordpress-ingress

spec:
  ingressClassName: {{ .Values.ingress.className }}

  tls:
  - hosts:
    - {{ .Values.ingress.host }}
    secretName: wordpress-tls

  rules:
  - host: {{ .Values.ingress.host }}

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: wordpress
            port:
              number: 80

# minikube addons enable ingress